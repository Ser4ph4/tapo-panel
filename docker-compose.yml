services:
  tapo-panel:
    image: ghcr.io/ser4ph4/tapo-panel:latest
    container_name: tapo-panel-note
    restart: unless-stopped
    environment:
      TAPO_EMAIL: ${TAPO_EMAIL}
      TAPO_PASSWORD: ${TAPO_PASSWORD}
      POLL_INTERVAL_SECONDS: "120"
      DB_PATH: /data/tapo.db
      CONFIG_PATH: /app/config.json
      HEALTHCHECK_URL: ${HEALTHCHECK_URL:-}
    volumes:
      - /opt/tapo-dashboard/config.json:/app/config.json:ro
      - tapo_data:/data
    ports:
      - "0.0.0.0:5500:5000"

volumes:
  tapo_data:
