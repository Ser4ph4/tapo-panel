<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verificação 2FA · Tapo Panel</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-badge">T</div>
      <div>
        <div class="statusbar-title">TAPO PANEL</div>
        <div class="statusbar-sub">Energy Monitor</div>
      </div>
    </div>

    <h1 class="auth-title">Verificação em duas etapas</h1>
    <p class="auth-sub">Digite o código do seu app autenticador</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="auth-flash">
          {% for msg in messages %}<div>{{ msg }}</div>{% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" class="auth-form">
      <label class="auth-label" for="token">código de 6 dígitos</label>
      <input
        class="auth-input auth-input-otp"
        type="text"
        id="token"
        name="token"
        inputmode="numeric"
        pattern="[0-9]*"
        maxlength="6"
        autocomplete="one-time-code"
        required
        autofocus
      />

      <button class="auth-submit" type="submit">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        verificar
      </button>
    </form>

    <a class="auth-back" href="/login">← voltar pro login</a>
  </div>
</body>
</html>
