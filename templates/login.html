<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login · Tapo Panel</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-badge">T</div>
      <div>
        <div class="statusbar-title">TAPO PANEL</div>
        <div class="statusbar-sub">Energy Monitor</div>
      </div>
    </div>

    <h1 class="auth-title">Entrar</h1>
    <p class="auth-sub">Acesso restrito ao painel de energia</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="auth-flash">
          {% for msg in messages %}<div>{{ msg }}</div>{% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" class="auth-form">
      <label class="auth-label" for="username">usuário</label>
      <input class="auth-input" type="text" id="username" name="username" autocomplete="username" required autofocus />

      <label class="auth-label" for="password">senha</label>
      <input class="auth-input" type="password" id="password" name="password" autocomplete="current-password" required />

      <button class="auth-submit" type="submit">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        continuar
      </button>
    </form>
  </div>
</body>
</html>
